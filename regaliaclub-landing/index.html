<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="24Kt NFC Business Cards for VIP members only." />
  <meta name="theme-color" content="#050505" />
  <title>24Kt NFC Business Card | VIP Members</title>
  <style>
    :root {
      --bg: #050505;
      --gold-light: #e8cc7a;
      --panel-border: rgba(201, 162, 74, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .page {
      min-height: 100vh;
    }

    .hero {
      background: var(--bg);
      padding: 0;
    }

    .mockup-desktop {
      display: none;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0;
    }

    .mockup-frame {
      position: relative;
      width: 100%;
      max-width: 1024px;
      margin: 0 auto;
      aspect-ratio: 1024 / 803;
      overflow: hidden;
    }

    .mockup-frame picture,
    .mockup-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mockup-mobile {
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 480px;
      margin: 0 auto;
    }

    .mockup-mobile .panel {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .mockup-mobile .panel-vip {
      aspect-ratio: 387 / 803;
    }

    .hotspot {
      position: absolute;
      z-index: 5;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-decoration: none;
    }

    .hotspot:focus-visible {
      outline: 2px solid var(--gold-light);
      outline-offset: 2px;
    }

    .hotspot-contact-full {
      left: 22.46%;
      top: 86.18%;
      width: 33.30%;
      height: 2.40%;
    }

    .hotspot-contact-vip {
      left: 59.43%;
      top: 86.18%;
      width: 40.57%;
      height: 2.40%;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 900px) {
      .mockup-desktop { display: block; }
      .mockup-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero" aria-label="24Kt NFC Business Card VIP presentation">
      <div class="mockup-desktop">
        <div class="mockup-frame">
          <picture>
            <source
              type="image/webp"
              srcset="assets/vip-landing/full-mockup@2x.webp 2x, assets/vip-landing/full-mockup.webp 1x"
            />
            <img
              src="assets/vip-landing/full-mockup.png"
              alt="24Kt NFC Business Card for VIP members only"
              width="1024"
              height="803"
              fetchpriority="high"
            />
          </picture>
          <a
            class="hotspot hotspot-contact-full"
            href="mailto:andyw@goldenthroneofficial.com"
            aria-label="Email contact: andyw@goldenthroneofficial.com"
          >
            <span class="sr-only">contact : andyw@goldenthroneofficial.com</span>
          </a>
        </div>
      </div>

      <div class="mockup-mobile">
        <div class="panel panel-vip">
          <picture>
            <source
              type="image/webp"
              srcset="assets/vip-landing/panel-vip@2x.webp 2x, assets/vip-landing/panel-vip.webp 1x"
            />
            <img
              src="assets/vip-landing/panel-vip.png"
              alt="24Kt NFC Business Card for VIP members only"
              width="387"
              height="803"
              fetchpriority="high"
            />
          </picture>
          <a
            class="hotspot hotspot-contact-vip"
            href="mailto:andyw@goldenthroneofficial.com"
            aria-label="Email contact: andyw@goldenthroneofficial.com"
          >
            <span class="sr-only">contact : andyw@goldenthroneofficial.com</span>
          </a>
        </div>

        <div class="panel panel-mobile-1">
          <picture>
            <source
              type="image/webp"
              srcset="assets/vip-landing/panel-mobile-1@2x.webp 2x, assets/vip-landing/panel-mobile-1.webp 1x"
            />
            <img
              src="assets/vip-landing/panel-mobile-1.png"
              alt=""
              width="305"
              height="803"
              loading="lazy"
            />
          </picture>
        </div>

        <div class="panel panel-mobile-2">
          <picture>
            <source
              type="image/webp"
              srcset="assets/vip-landing/panel-mobile-2@2x.webp 2x, assets/vip-landing/panel-mobile-2.webp 1x"
            />
            <img
              src="assets/vip-landing/panel-mobile-2.png"
              alt=""
              width="332"
              height="803"
              loading="lazy"
            />
          </picture>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
