name: Deploy Namecard

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/AndyLanding
            git fetch origin
            git reset --hard origin/master
            git clean -fd
            chmod +x bootstrap-all-namecards.sh deploy-ssl.sh sync-site.sh fix-dns.sh 2>/dev/null || true
            CERTBOT_EMAIL=admin@cyber-beast.tech ./bootstrap-all-namecards.sh
